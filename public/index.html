<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VirusTotal Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header>
  <div class="hdr-l">
    <img class="hdr-logo" src="logo_ufpe.png" alt="UFPE">
    <div class="hdr-title">
      <h1>VirusTotal Dashboard</h1>
      <p>Análise de detecção de malware</p>
    </div>
    <span class="badge" id="badge">0 scans</span>
  </div>
  <div class="hdr-r">
    <button class="btn btn-g" onclick="clearAllScans()">🗑 Limpar tudo</button>
  </div>
</header>

<main>
  <section>
    <div class="shdr"><h2>Enviar Arquivos para Análise</h2></div>
    <div class="up-panel">
      <div class="up-row">
        <div class="up-field">
          <label class="up-label" for="vt-apikey">Chave de API (VirusTotal)</label>
          <input type="password" id="vt-apikey" class="up-input" placeholder="Cole sua API key…" autocomplete="off" oninput="onVtApiKeyInput(this.value)">
          <div class="up-hint" id="vt-apikey-hint"></div>
        </div>
      </div>
      <div class="up-row">
        <div class="up-field">
          <label class="up-label" for="vt-files">Arquivos (um ou mais)</label>
          <input type="file" id="vt-files" multiple onchange="onVtFilesSelected(this)">
        </div>
      </div>
      <div class="up-row">
        <div class="up-field">
          <label class="up-label">Senha de arquivos protegidos (ZIP)</label>
          <div class="up-pass-mode">
            <label><input type="radio" name="vt-pass-mode" value="shared" checked onchange="setVtPassMode('shared')"> Mesma senha para todos</label>
            <label><input type="radio" name="vt-pass-mode" value="individual" onchange="setVtPassMode('individual')"> Senha individual por arquivo</label>
          </div>
          <input type="password" id="vt-pass-shared-input" class="up-input" placeholder="Senha (opcional)" autocomplete="off">
        </div>
      </div>
      <div id="vt-file-list" class="up-file-list"></div>
      <button class="btn btn-acc" id="vt-submit-btn" onclick="submitVtUploads()">⬆ Enviar e Analisar</button>
      <div id="vt-jobs" class="up-jobs"></div>
    </div>
  </section>

  <section>
    <div class="shdr"><h2>Visão Geral</h2></div>
    <div class="ov-grid" id="ov"></div>
  </section>

  <section>
    <div class="shdr"><h2>Amostras Analisadas</h2><span class="cnt" id="sc-cnt">0</span></div>
    <div class="sc-toolbar">
      <div class="sc-search">
        <span class="sc-search-icon">⌕</span>
        <input type="text" id="sc-filter" placeholder="Filtrar por hash…" oninput="filterScans(this.value)">
      </div>
      <select class="sc-sort" id="sc-sort" onchange="changeSortMode(this.value)">
        <option value="default">Ordem original</option>
        <option value="rate-desc">Maior detecção</option>
        <option value="rate-asc">Menor detecção</option>
      </select>
    </div>
    <div class="sc-grid" id="scg"></div>
  </section>

  <section>
    <div class="shdr"><h2>Ranking de Engines</h2></div>
    <div class="tw">
      <div class="tabs">
        <button class="tab active" onclick="switchTab(this,'tp-det')">🔴 Top Detectores</button>
        <button class="tab" onclick="switchTab(this,'tp-miss')">🟢 Mais Falhas</button>
        <button class="tab" onclick="switchTab(this,'tp-inc')">🟡 Inconsistentes</button>
        <button class="tab" onclick="switchTab(this,'tp-nev')">⚫ Nunca Detectou</button>
        <button class="tab" onclick="switchTab(this,'tp-all')">📋 Todas</button>
      </div>
      <div id="tp-det" class="tp active"></div>
      <div id="tp-miss" class="tp"></div>
      <div id="tp-inc" class="tp"></div>
      <div id="tp-nev" class="tp"></div>
      <div id="tp-all" class="tp"></div>
    </div>
  </section>

  <section>
    <div class="shdr"><h2>Malware Menos Identificado</h2><span class="cnt" id="lm-cnt">0</span></div>
    <div class="tw">
      <div id="lm-table"></div>
    </div>
  </section>

  <section>
    <div class="shdr"><h2>Nomes de Detecção Mais Comuns</h2><span class="cnt" id="nc">0</span></div>
    <div id="nl"></div>
  </section>
</main>

<div id="toast"></div>

<script>
const INITIAL_DATA = [];

</script>
<script src="dashboard.js"></script>
<script src="vt-client.js"></script>
</body>
</html>
