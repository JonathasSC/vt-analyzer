<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VirusTotal Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="dashboard.css">
</head>
<body>

<header>
  <div class="hdr-l">
    <img class="hdr-logo" src="logo_ufpe.png" alt="UFPE">
    <div class="hdr-title">
      <h1>VirusTotal Dashboard</h1>
      <p>Análise de detecção de malware</p>
    </div>
    <span class="badge" id="badge">0 scans</span>
  </div>
  <div class="hdr-r">
    <button class="btn btn-g" onclick="resetToDefault()">↺ Restaurar padrão</button>
  </div>
</header>

<main>
  <section>
    <div class="shdr"><h2>Visão Geral</h2></div>
    <div class="ov-grid" id="ov"></div>
  </section>

  <section>
    <div class="shdr"><h2>Amostras Analisadas</h2><span class="cnt" id="sc-cnt">0</span></div>
    <div class="sc-toolbar">
      <div class="sc-search">
        <span class="sc-search-icon">⌕</span>
        <input type="text" id="sc-filter" placeholder="Filtrar por hash…" oninput="filterScans(this.value)">
      </div>
      <select class="sc-sort" id="sc-sort" onchange="changeSortMode(this.value)">
        <option value="default">Ordem original</option>
        <option value="rate-desc">Maior detecção</option>
        <option value="rate-asc">Menor detecção</option>
      </select>
    </div>
    <div class="sc-grid" id="scg"></div>
  </section>

  <section>
    <div class="shdr"><h2>Ranking de Engines</h2></div>
    <div class="tw">
      <div class="tabs">
        <button class="tab active" onclick="switchTab(this,'tp-det')">🔴 Top Detectores</button>
        <button class="tab" onclick="switchTab(this,'tp-miss')">🟢 Mais Falhas</button>
        <button class="tab" onclick="switchTab(this,'tp-inc')">🟡 Inconsistentes</button>
        <button class="tab" onclick="switchTab(this,'tp-nev')">⚫ Nunca Detectou</button>
        <button class="tab" onclick="switchTab(this,'tp-all')">📋 Todas</button>
      </div>
      <div id="tp-det" class="tp active"></div>
      <div id="tp-miss" class="tp"></div>
      <div id="tp-inc" class="tp"></div>
      <div id="tp-nev" class="tp"></div>
      <div id="tp-all" class="tp"></div>
    </div>
  </section>

  <section>
    <div class="shdr"><h2>Malware Menos Identificado</h2><span class="cnt" id="lm-cnt">0</span></div>
    <div class="tw">
      <div id="lm-table"></div>
    </div>
  </section>

  <section>
    <div class="shdr"><h2>Nomes de Detecção Mais Comuns</h2><span class="cnt" id="nc">0</span></div>
    <div id="nl"></div>
  </section>
</main>
